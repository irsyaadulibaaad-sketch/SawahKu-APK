name: Build SawahKu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Download Android Build Tools
      run: |
        sdkmanager "build-tools;34.0.0"
        sdkmanager "platforms;android-34"
        
    - name: Create Gradle Wrapper
      run: |
        mkdir -p app
        cd app
        # Create minimal gradle wrapper
        echo 'distributionBase=GRADLE_USER_HOME' > gradle/wrapper/gradle-wrapper.properties
        echo 'distributionPath=wrapper/dists' >> gradle/wrapper/gradle-wrapper.properties
        echo 'distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip' >> gradle/wrapper/gradle-wrapper.properties
        echo 'networkTimeout=10000' >> gradle/wrapper/gradle-wrapper.properties
        echo 'zipStoreBase=GRADLE_USER_HOME' >> gradle/wrapper/gradle-wrapper.properties
        echo 'zipStorePath=wrapper/dists' >> gradle/wrapper/gradle-wrapper.properties
        mkdir -p gradle/wrapper
        
    - name: Build APK using AAPT2
      run: |
        # Setup paths
        ANDROID_SDK=$ANDROID_SDK_ROOT
        BUILD_TOOLS=$ANDROID_SDK/build-tools/34.0.0
        PLATFORM=$ANDROID_SDK/platforms/android-34
        
        # Create output directory
        mkdir -p output
        
        # Compile resources
        $BUILD_TOOLS/aapt2 compile --dir app/src/main/res -o output/resources.zip
        
        # Link resources and create base APK
        $BUILD_TOOLS/aapt2 link \
          -I $PLATFORM/android.jar \
          --manifest app/src/main/AndroidManifest.xml \
          -o output/base.apk \
          output/resources.zip \
          --java output/java \
          --auto-add-overlay
          
    - name: Create Simple APK
      run: |
        # Create minimal APK with WebView
        mkdir -p output/apk
        cd output/apk
        unzip -o ../base.apk
        
        # Add assets
        mkdir -p assets/www
        cp -r ../../app/src/main/assets/www/* assets/www/ 2>/dev/null || true
        
        # Repackage
        zip -r ../../SawahKu.apk .
        cd ../..
        
    - name: Align APK
      run: |
        $ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign -p 4 output/SawahKu.apk output/SawahKu-aligned.apk
        
    - name: Sign APK
      run: |
        # Create debug keystore if not exists
        if [ ! -f debug.keystore ]; then
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi
        
        $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
          --ks debug.keystore \
          --ks-pass pass:android \
          --key-pass pass:android \
          --out SawahKu-signed.apk \
          output/SawahKu-aligned.apk
          
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SawahKu-APK
        path: SawahKu-signed.apk
        retention-days: 90
