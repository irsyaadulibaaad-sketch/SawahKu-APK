name: Build SawahKu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Ambil kode dari repository
      uses: actions/checkout@v4
      
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install Capacitor
      run: |
        npm install -g @capacitor/cli @capacitor/core @capacitor/android
        
    - name: Setup project Capacitor
      run: |
        echo '{
          "name": "sawahku",
          "version": "1.0.0"
        }' > package.json
        npx cap init SawahKu com.sawahku.app --web-dir app/src/main/assets/www --no-interactive
        
    - name: Tambah platform Android
      run: |
        npx cap add android
        
    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug
        
    - name: Simpan APK untuk di-download
      uses: actions/upload-artifact@v4
      with:
        name: SawahKu-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
