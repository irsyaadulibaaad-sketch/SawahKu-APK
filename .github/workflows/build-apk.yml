name: Build SawahKu APK

# Kapan robot ini bekerja?
on:
  push:
    branches: [ main ]        # Setiap ada perubahan di branch main
  pull_request:
    branches: [ main ]
  workflow_dispatch:           # Atau bisa ditekan manual

# Pekerjaan yang dilakukan robot
jobs:
  build:
    runs-on: ubuntu-latest     # Server Linux di GitHub
    
    steps:
    # Langkah 1: Ambil kode dari gudang
    - name: Checkout code
      uses: actions/checkout@v4
      
    # Langkah 2: Install Java (bahasa pemrograman untuk Android)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    # Langkah 3: Install Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    # Langkah 4: Download tools Android
    - name: Download Android Build Tools
      run: |
        sdkmanager "build-tools;34.0.0"
        sdkmanager "platforms;android-34"
        
    # Langkah 5: Build APK!
    - name: Build APK
      run: |
        cd app
        chmod +x gradlew || true
        ./gradlew assembleDebug
        
    # Langkah 6: Simpan hasil APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SawahKu-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
